        body, html {
            margin: 0;
            padding: 0;
            width: 100%;

            overflow: hidden; /* Prevents scrollbars */

        /* Make iframe fill the entire viewport */
        iframe {
            display: block; /* Removes any inline element spacing */
            width: 100vw;
            height: 100vh;
            border: none;
        }
    </style>
</head>

        src="https://emea.iframed.cn.dmti.cloud/content/328/game/finn-and-bones/uk/finnandbones-280918/index.html"
