<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Text to Pipedream</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        textarea {
            width: 100%;
            height: 100px;
            font-size: 16px;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <h1>Send Text to Pipedream</h1>
    
    <!-- Text Box -->
    <textarea id="inputText" placeholder="Type your text here..."></textarea>
    
    <!-- Submit Button -->
    <button id="submitButton">Send to Pipedream</button>

    <script>
        document.getElementById('submitButton').addEventListener('click', function() {
            // Get the input text
            const text = document.getElementById('inputText').value;

            // Check if there's any text entered
            if (text.trim() === "") {
                alert("Please enter some text!");
                return;
            }

            // Your Pipedream webhook URL
            const webhookUrl = "https://eottjwraz9o9qlm.m.pipedream.net";

            // Create the payload
            const payload = JSON.stringify({
                content: text // Sends the text as the content of the message
            });

            // Create the POST request
            fetch(webhookUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: payload
            })
            .then(response => {
                if (response.ok) {
                    alert("Text sent to Pipedream!");
                } else {
                    alert("Failed to send text.");
                }
            })
            .catch(error => {
                alert("Error: " + error);
            });

            // Clear the text area after sending
            document.getElementById('inputText').value = "";
        });
    </script>

</body>
</html>
