<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Text Box</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        textarea {
            width: 100%;
            height: 200px;
            font-size: 16px;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h1>Input Your Text Below</h1>
    
    <!-- Simple Text Box -->
    <textarea placeholder="Type your text here..."></textarea>

</body>
</html>
